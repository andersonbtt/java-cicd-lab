name: CI

on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: app

jobs:
  test:
    name: Maven verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: app/pom.xml

      - name: Run tests
        run: mvn -B verify
